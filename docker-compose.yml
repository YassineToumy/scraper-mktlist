services:
  mktlist:
    build: .
    container_name: scraper-mktlist
    restart: unless-stopped
    environment:
      - MONGODB_URI=${MONGODB_URI}
      - MONGO_MKTLIST_DB=${MONGO_MKTLIST_DB:-mktlist}
      - MONGO_MKTLIST_COL=${MONGO_MKTLIST_COL:-locations}
      - MONGO_MKTLIST_COL_CLEAN=${MONGO_MKTLIST_COL_CLEAN:-locations_clean}
      - BATCH_SIZE=${BATCH_SIZE:-500}
      - CYCLE_SLEEP=${CYCLE_SLEEP:-86400}
      - B2_KEY_ID=${B2_KEY_ID}
      - B2_APPLICATION_KEY=${B2_APPLICATION_KEY}
      - B2_ENDPOINT=${B2_ENDPOINT:-https://s3.us-east-005.backblazeb2.com}
      - B2_BUCKET=${B2_BUCKET:-immo-world}
    volumes:
      - ./logs:/app/logs
